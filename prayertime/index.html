<title>നിസ്കാര സമയം</title>

<style>
:root {
    --primary: #0d47a1;
    --secondary: #1976d2;
    --bg: #eef3f8;
    --card: #ffffff;
    --highlight: #fff3cd;
    --next: #d1ecf1;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
}

/* Header */
.header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
}

/* Container */
.container {
    padding: 12px;
}

/* Dropdown */
select {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* Card */
.card {
    background: var(--card);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* Highlight today */
.today {
    background: var(--highlight);
    border-left: 5px solid orange;
}

/* Next prayer highlight */
.next-prayer {
    background: var(--next);
}

/* Row layout */
.row {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
}

.time-box {
    width: 30%;
    text-align: center;
    margin-top: 8px;
}

.label {
    font-size: 12px;
    color: #555;
}

.time {
    font-size: 16px;
    font-weight: bold;
    color: var(--primary);
}

/* Date */
.date {
    font-weight: bold;
    font-size: 15px;
    margin-bottom: 5px;
}

/* Footer */
.footer {
    text-align: center;
    font-size: 12px;
    color: #666;
    margin-top: 10px;
}

</style>
</head>

function getNextPrayer(row) {
    const now = new Date();
    const currentMinutes = now.getHours()*60 + now.getMinutes();

    const prayers = [
        {name:"സുബ്ഹ്", time: row.subh},
        {name:"ളുഹർ", time: row.dhuhr},
        {name:"അസർ", time: row.asr},
        {name:"മഗ്‌രിബ്", time: row.maghrib},
        {name:"ഇശാ", time: row.isha}
    ];

    for (let p of prayers) {
        let [h,m] = p.time.split(".");
        let minutes = parseInt(h)*60 + parseInt(m);
        if (minutes > currentMinutes) return p.name;
    }
    return "സുബ്ഹ്";
}

function renderData() {
    const container = document.getElementById("content");
    const month = document.getElementById("monthSelect").value;
    const now = new Date();

    container.innerHTML = "";

    if(!prayerData[month]) return;

    prayerData[month].forEach(row => {

        const isToday =
            month === monthNames[now.getMonth()] &&
            now.getDate() >= row.range[0] &&
            now.getDate() <= row.range[1];

        const nextPrayer = getNextPrayer(row);

        const card = document.createElement("div");
        card.className = "card" + (isToday ? " today" : "");

        card.innerHTML = `
            <div class="date">${row.range[0]} - ${row.range[1]}</div>
            <div class="row">
                ${createBox("ഉദയം",row.sunrise,"")}
                ${createBox("സുബ്ഹ്",row.subh,nextPrayer)}
                ${createBox("ളുഹർ",row.dhuhr,nextPrayer)}
                ${createBox("അസർ",row.asr,nextPrayer)}
                ${createBox("മഗ്‌രിബ്",row.maghrib,nextPrayer)}
                ${createBox("ഇശാ",row.isha,nextPrayer)}
            </div>
        `;

        container.appendChild(card);
    });
}

function createBox(label,time,next){
    return `
    <div class="time-box ${label===next?'next-prayer':''}">
        <div class="label">${label}</div>
        <div class="time">${time}</div>
    </div>`;
}

Object.keys(monthTranslation).forEach(m => {
    let opt = document.createElement("option");
    opt.value = m;
    opt.textContent = monthTranslation[m];
    select.appendChild(opt);
});

const now = new Date();
select.value = monthNames[now.getMonth()];
renderData();
