<div class="card ao"><div class="card-title"><span class="cdot" style="background:var(--saffron)"></span>Characteristics of Gifted Children</div><div class="g2"><div class="mini-card"><div class="mc-title">Advanced vocabulary</div><div class="mc-text">Reads and communicates beyond age level</div></div><div class="mini-card"><div class="mc-title">Intense curiosity</div><div class="mc-text">Asks complex, probing questions</div></div><div class="mini-card"><div class="mc-title">Rapid learning</div><div class="mc-text">Less repetition needed; quick mastery</div></div><div class="mini-card"><div class="mc-title">High creativity</div><div class="mc-text">Originality in ideas and problem-solving</div></div><div class="mini-card"><div class="mc-title">Perfectionism</div><div class="mc-text">High standards; self-critical</div></div><div class="mini-card"><div class="mc-title">Possible isolation</div><div class="mc-text">Asynchronous development; social mismatch</div></div></div></div>
<div class="card ag"><div class="card-title"><span class="cdot" style="background:var(--mint)"></span>Educational Provisions</div><div class="tbl-wrap"><table class="dtbl"><tr><th>Approach</th><th>Description</th><th>Advantage</th></tr><tr><td><strong>Acceleration</strong></td><td>Advancing to higher grade levels / skipping grades</td><td>Meets academic level; prevents boredom</td></tr><tr><td><strong>Enrichment</strong></td><td>Deeper/broader exploration within regular grade</td><td>Social cohesion maintained; greater depth</td></tr><tr><td><strong>Pull-Out Programs</strong></td><td>Special sessions outside regular class</td><td>Peer interaction with similar ability</td></tr><tr><td><strong>Mentorship</strong></td><td>Pairing with expert mentors in area of talent</td><td>Real-world application and inspiration</td></tr></table></div></div>
<div class="mbox"><p><strong>Asynchronous Development:</strong> Gifted children often show uneven development — years ahead intellectually but at age-level emotionally or socially. This mismatch requires teachers' understanding and support, not dismissal.</p></div>`,
'Policy & UDL':`
<div class="card al"><div class="card-title"><span class="cdot"></span>Legal Framework — India</div><div class="tbl-wrap"><table class="dtbl"><tr><th>Act</th><th>Year</th><th>Key Provisions</th></tr><tr><td><strong>Persons with Disabilities Act</strong></td><td>1995</td><td>3% reservation; free education up to age 18 for CWSN</td></tr><tr><td><strong>RTE Act</strong></td><td>2009</td><td>Free & compulsory education (6–14 yrs); inclusive provisions for CWSN</td></tr><tr><td><strong>RPWD Act</strong></td><td>2016</td><td>Expanded from 7 to 21 disability categories; 5% reservation</td></tr><tr><td><strong>NEP</strong></td><td>2020</td><td>Strong emphasis on inclusion, UDL, multiple assessment options</td></tr><tr><td><strong>Salamanca Statement</strong></td><td>1994</td><td>UNESCO commitment to inclusive education for all CWSN</td></tr></table></div></div>
<div class="card ao"><div class="card-title"><span class="cdot" style="background:var(--saffron)"></span>Universal Design for Learning (UDL)</div><p style="margin-bottom:8px;">Framework for designing curriculum accessible to ALL learners from the start. Three principles:</p><div class="steps"><div class="step"><div class="snum" style="background:var(--mint)">1</div><div class="stext"><strong>Multiple Means of Representation (the "What"):</strong> Present information in visual, auditory, text, and hands-on formats.</div></div><div class="step"><div class="snum" style="background:var(--mint)">2</div><div class="stext"><strong>Multiple Means of Action & Expression (the "How"):</strong> Students demonstrate knowledge via oral, written, drawn, acted, or built responses.</div></div><div class="step"><div class="snum" style="background:var(--mint)">3</div><div class="stext"><strong>Multiple Means of Engagement (the "Why"):</strong> Offer choices, vary challenge, connect to student interests to sustain motivation.</div></div></div></div>
<div class="hbox"><div class="hbox-title">⚡ Inclusive Ed Exam Points</div><ul><li><strong>CWSN</strong> = Children With Special Needs (preferred, non-stigmatizing term)</li><li><strong>IEP</strong> = Individual Education Program — customized plan for each CWSN student</li><li><strong>Integration ≠ Inclusion.</strong> Integration places CWSN in regular class with minimal change. Inclusion restructures the whole system to welcome all learners.</li><li><strong>LRE</strong> (Least Restrictive Environment) — full inclusion in regular classroom is the ideal goal</li></ul></div>`
    }
  }
};

const MORE_SECTIONS = ['personality','motivation','language','inclusive'];
const MORE_LABELS = {personality:'👤 Personality',motivation:'🎯 Motivation',language:'💬 Language',inclusive:'🤝 Inclusive Ed'};

let curSection = 'growth';
let curTab = null;
let moreOpen = false;

function goSection(key, el){
  // close more menu
  closeMore();

  // handle "more" button
  if(key==='more'){
    toggleMore(el);
    return;
  }

  // deactivate all bottom nav items
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  curSection = key;
  const sec = SECTIONS[key];
  curTab = sec.tabs[0];
  renderTabs(sec.tabs);
  renderContent();
  document.getElementById('scroll-area').scrollTop=0;
}

function toggleMore(el){
  moreOpen = !moreOpen;
  const overlay = document.getElementById('more-overlay');
  if(moreOpen){
    document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    // build more items
    const container = document.getElementById('more-items');
    container.innerHTML = MORE_SECTIONS.map(k=>`
      <div onclick="selectMore('${k}')" style="padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text);">
        ${MORE_LABELS[k]}
        <span style="margin-left:auto;color:var(--muted);font-size:11px;">${SECTIONS[k].badge}</span>
      </div>
    `).join('');
    overlay.style.display='block';
    // close if tap outside
    setTimeout(()=>document.addEventListener('click', outsideClose, {once:true}),50);
  } else {
    overlay.style.display='none';
  }
}

function outsideClose(e){
  if(!document.getElementById('more-overlay').contains(e.target)){
    closeMore();
  }
}

function closeMore(){
  moreOpen=false;
  document.getElementById('more-overlay').style.display='none';
}

function selectMore(key){
  closeMore();
  curSection = key;
  const sec = SECTIONS[key];
  curTab = sec.tabs[0];
  renderTabs(sec.tabs);
  renderContent();
  document.getElementById('scroll-area').scrollTop=0;
  // update bottom nav — activate "more" button
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const moreBtn = document.querySelector('.bnav-item:last-child');
  moreBtn.classList.add('active');
}

function switchTab(tab, el){
  curTab = tab;
  document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderContent();
  document.getElementById('scroll-area').scrollTop=0;
}

function renderTabs(tabs){
  document.getElementById('tab-strip').innerHTML = tabs.map(t=>
    `<button class="tpill${t===curTab?' active':''}" onclick="switchTab('${t}',this)">${t}</button>`
  ).join('');
}

function renderContent(){
  const sec = SECTIONS[curSection];
  const html = sec.content[curTab]||'<p>Content coming soon.</p>';
  document.getElementById('scroll-area').innerHTML=`
    <div class="sec-head">
      <div class="sec-title">${sec.title}</div>
      <div class="sec-crumb">${sec.badge} — ${curTab}</div>
    </div>
    ${html}
  `;
}

// init
window.onload=function(){
  curTab = SECTIONS['growth'].tabs[0];
  renderTabs(SECTIONS['growth'].tabs);
  renderContent();
};
</script>
