<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTET Psychology Navigator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f2444;
  --navy-mid: #1a3a6b;
  --navy-light: #2856a3;
  --saffron: #e8820c;
  --saffron-light: #fdf0e0;
  --mint: #0a8a6e;
  --mint-light: #e4f7f3;
  --violet: #5b3fa6;
  --violet-light: #ede9f9;
  --rose: #b93060;
  --rose-light: #fce9ef;
  --bg: #f4f6fb;
  --surface: #ffffff;
  --text: #1a2437;
  --muted: #6b7a96;
  --border: #dde3ef;
  --sidebar-w: 88px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
.header {
  background: var(--navy);
  padding: 0 20px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 30;
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--saffron), #f5a623);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: white;
  font-family: 'Playfair Display', serif;
}
.header-title { font-size: 16px; font-weight: 600; color: white; letter-spacing: 0.2px; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 1px; }
.header-badge {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
}

/* LAYOUT */
.workspace { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  display: flex;
  flex-direction: column;
  padding: 8px 0;
  overflow-y: auto;
  flex-shrink: 0;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 6px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  gap: 5px;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,0.06); }
.nav-item.active { border-left-color: var(--saffron); background: rgba(255,255,255,0.08); }
.nav-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  background: rgba(255,255,255,0.07);
  transition: 0.15s;
}
.nav-item.active .nav-icon { background: var(--saffron); }
.nav-label { font-size: 9.5px; color: rgba(255,255,255,0.5); font-weight: 500; text-align: center; line-height: 1.2; letter-spacing: 0.3px; }
.nav-item.active .nav-label { color: rgba(255,255,255,0.85); }

/* MAIN PANEL */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* TOP BAR with tabs */
.top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 4px;
  height: 48px;
  flex-shrink: 0;
  overflow-x: auto;
}
.top-bar::-webkit-scrollbar { display: none; }
.tab-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  color: var(--muted);
  border: 1px solid transparent;
  transition: all 0.12s;
  background: transparent;
  flex-shrink: 0;
}
.tab-pill:hover { background: var(--bg); color: var(--text); }
.tab-pill.active { background: var(--navy); color: white; }

/* CONTENT */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 24px 40px;
}

/* SECTION HEADER */
.section-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.section-title { font-size: 22px; font-weight: 700; color: var(--navy); font-family: 'Playfair Display', serif; }
.section-meta { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
.section-badge {
  background: var(--saffron-light);
  color: var(--saffron);
  border: 1px solid #f5c87a;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 14px;
}
.card-accent-navy { border-left: 4px solid var(--navy-light); }
.card-accent-saffron { border-left: 4px solid var(--saffron); }
.card-accent-mint { border-left: 4px solid var(--mint); }
.card-accent-violet { border-left: 4px solid var(--violet); }
.card-accent-rose { border-left: 4px solid var(--rose); }

.card h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.card h3 .ch-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--navy-light);
  flex-shrink: 0;
}
.card p { font-size: 13px; line-height: 1.6; color: #3d4e68; }
.card ul { margin-left: 18px; margin-top: 6px; }
.card li { font-size: 13px; line-height: 1.6; color: #3d4e68; margin-bottom: 5px; }

/* HIGHLIGHT BOX */
.highlight-box {
  background: var(--saffron-light);
  border: 1px dashed var(--saffron);
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 10px;
  margin-bottom: 14px;
}
.highlight-box .hb-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--saffron);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.highlight-box p, .highlight-box li { font-size: 12.5px; color: #7a4500; line-height: 1.55; }
.highlight-box ul { margin-left: 16px; margin-top: 4px; }

/* INFO BOX */
.info-box {
  background: var(--mint-light);
  border: 1px solid #a3d9cc;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 14px;
}
.info-box p { font-size: 12.5px; color: #094f3f; line-height: 1.55; }
.info-box strong { color: #076050; }

.violet-box {
  background: var(--violet-light);
  border: 1px solid #c0aff0;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 14px;
}
.violet-box p { font-size: 12.5px; color: #3d2a7a; line-height: 1.55; }

/* GRID CARDS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.mini-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}
.mini-card .mc-icon { font-size: 22px; margin-bottom: 6px; }
.mini-card .mc-title { font-size: 12px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.mini-card .mc-text { font-size: 11.5px; color: var(--muted); line-height: 1.5; }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 8px; }
.data-table th {
  background: var(--bg);
  color: var(--navy);
  font-weight: 600;
  text-align: left;
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.data-table td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.45;
  color: #3d4e68;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #fafbfd; }

/* PILLS */
.pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.pill {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11.5px;
  font-weight: 500;
}
.pill-navy { background: #e8eef8; color: var(--navy-mid); }
.pill-saffron { background: var(--saffron-light); color: #8a4800; }
.pill-mint { background: var(--mint-light); color: #095c4a; }
.pill-violet { background: var(--violet-light); color: #3d2a7a; }
.pill-rose { background: var(--rose-light); color: #7a1e3e; }

/* STEP FLOW */
.step-flow { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.step-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.step-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--navy);
  color: white;
  font-size: 12px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.step-text { font-size: 13px; color: #3d4e68; line-height: 1.5; padding-top: 4px; }
.step-text strong { color: var(--navy); }

/* STAGE BLOCKS for Piaget / Erikson etc */
.stage-block {
  display: flex;
  gap: 12px;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  align-items: flex-start;
}
.stage-age {
  background: var(--navy);
  color: white;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 10.5px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}
.stage-content h4 { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
.stage-content p { font-size: 12px; color: var(--muted); line-height: 1.5; }
.stage-content .stage-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.stage-content .stage-tag {
  background: var(--saffron-light);
  color: #8a4800;
  font-size: 10.5px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 8px;
}

/* QUOTE BLOCK */
.quote-block {
  border-left: 3px solid var(--navy-light);
  padding: 10px 14px;
  margin: 10px 0;
  background: #f4f6fb;
  border-radius: 0 8px 8px 0;
}
.quote-block p { font-size: 13px; color: var(--navy); font-style: italic; line-height: 1.5; }
.quote-block .quote-attr { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: normal; font-weight: 500; }

/* THEORY PILL TOP NAV */
.theory-nav {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 14px;
  margin-bottom: 6px;
  scrollbar-width: none;
}
.theory-nav::-webkit-scrollbar { display: none; }
.tnav-pill {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  border: 1.5px solid var(--border);
  color: var(--muted);
  background: var(--surface);
  transition: all 0.12s;
  flex-shrink: 0;
}
.tnav-pill.active {
  border-color: var(--navy);
  background: var(--navy);
  color: white;
}

/* HIERARCHY VISUAL */
.hierarchy {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 10px;
}
.h-level {
  display: flex;
  align-items: center;
  gap: 10px;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12.5px;
  font-weight: 500;
}
.h-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

/* COMPARE TABLE (Piaget vs Vygotsky) */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.compare-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.compare-card .cc-head {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: white;
}
.compare-card .cc-body { padding: 12px 14px; }
.compare-card .cc-item { font-size: 12px; color: #3d4e68; margin-bottom: 7px; line-height: 1.45; }
.compare-card .cc-item span { font-weight: 600; color: var(--navy); }

/* KOHLBERG LEVEL */
.kohl-level {
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.kohl-head {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.kohl-head .kl-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  font-weight: 600;
  text-transform: uppercase;
}
.kohl-body { padding: 10px 14px; background: var(--surface); }
.kohl-stage { font-size: 12px; color: #3d4e68; padding: 4px 0; border-bottom: 1px dashed var(--border); line-height: 1.5; }
.kohl-stage:last-child { border-bottom: none; }
.kohl-stage strong { color: var(--navy); }

/* SCROLLBAR */
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: #c5cde0; border-radius: 3px; }
</style>
</head>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">🧠️</div>
    <div>
      <div class="header-title">KTET Psychology Summary</div>
      <div class="header-sub">Category I · II · III & IV — Child Development & Pedagogy</div>
    </div>
  </div>
  <div class="header-badge">2025–26 Syllabus</div>
</div>

<div class="workspace">
  <div class="sidebar" id="sidebar">
    <div class="nav-item active" onclick="nav('growth',this)">
      <div class="nav-icon">🌱</div>
      <div class="nav-label">Growth & Dev</div>
    </div>
    <div class="nav-item" onclick="nav('learning_theories',this)">
      <div class="nav-icon">⚙️</div>
      <div class="nav-label">Learning Th.</div>
    </div>
    <div class="nav-item" onclick="nav('dev_theories',this)">
      <div class="nav-icon">🧠</div>
      <div class="nav-label">Dev. Theories</div>
    </div>
    <div class="nav-item" onclick="nav('intelligence',this)">
      <div class="nav-icon">💡</div>

    <div class="nav-item" onclick="nav('language',this)">

  <div class="main">
    <div class="top-bar" id="top-bar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const sections = {
  growth: {
    title: "Human Growth & Development",
    badge: "Segment 01",
    tabs: ["Overview", "Stages", "Principles", "Exam Tips"],
    content: {
      "Overview": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Growth vs. Development — Core Distinction</h3>
          <div class="grid-2" style="margin-top:10px;">
            <div style="background:#e8eef8;border-radius:8px;padding:12px;">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--navy-mid);margin-bottom:6px;">GROWTH</div>
              <p style="font-size:12.5px;color:#1a3a6b;line-height:1.55;">Quantitative changes in body size — height, weight, organ size. Measurable in cm/kg. Growth is <strong>temporary</strong> and stops at physical maturity (around 20 years).</p>
            </div>
            <div style="background:#fdf0e0;border-radius:8px;padding:12px;">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#8a4800;margin-bottom:6px;">DEVELOPMENT</div>
              <p style="font-size:12.5px;color:#7a3800;line-height:1.55;">Qualitative changes in function — cognitive, emotional, social maturity. <strong>Continuous</strong> process from conception through old age (senescence).</p>
            </div>
          </div>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Key Characteristics of Development</h3>
          <ul>
            <li><strong>Continuous & Gradual:</strong> Development never stops abruptly — it is a flowing, lifelong process.</li>
            <li><strong>Holistic & Integrated:</strong> Physical, cognitive, emotional, and social domains develop together, not in isolation.</li>
            <li><strong>Sequenced & Patterned:</strong> Every child follows the same universal sequence (crawl → stand → walk), though the pace varies.</li>
            <li><strong>Individual Rate:</strong> No two children develop at exactly the same speed — normal variation is expected.</li>
            <li><strong>Influenced by Heredity & Environment (H+E):</strong> Both nature (genes) and nurture (experience) shape the course of development.</li>
            <li><strong>Cumulative:</strong> Each stage builds upon previous stages. Later development depends on earlier foundations.</li>
          </ul>
        </div>
        <div class="highlight-box">
          <div class="hb-title">⚡ Examiner Favourite</div>
          <ul>
            <li>Growth is <strong>quantitative</strong>; Development is <strong>qualitative</strong> — this distinction appears in almost every KTET paper.</li>
            <li>Development proceeds from <strong>general to specific</strong> (child waves arm before picking up a pin).</li>
            <li>"Storm and Stress" — coined by <strong>G. Stanley Hall</strong> for adolescence.</li>
          </ul>
        </div>
      `,
      "Stages": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Developmental Stages — Full Breakdown</h3>
          <p style="font-size:12.5px;color:var(--muted);margin-bottom:12px;">Each stage has characteristic behaviors, social context, and critical developmental tasks:</p>
        </div>
        <div class="stage-block">
          <div class="stage-age">Prenatal<br>Conception–Birth</div>
          <div class="stage-content">
            <h4>Prenatal Period</h4>
            <p>Rapid cellular division and organ formation. Three phases: Germinal (0–2 weeks), Embryonic (2–8 weeks), Fetal (8 weeks–birth). Brain forms from neural tube. Most vulnerable to teratogens.</p>
            <div class="stage-tags"><span class="stage-tag">Germinal Stage</span><span class="stage-tag">Embryonic Stage</span><span class="stage-tag">Fetal Stage</span><span class="stage-tag">Teratogens</span></div>
          </div>
        </div>
        <div class="stage-block">
          <div class="stage-age">Infancy<br>0–2 Years</div>
          <div class="stage-content">
            <h4>Infancy — "The Critical Period"</h4>
            <p>Most rapid growth phase after birth. Development of sensorimotor coordination, attachment to caregiver (Bowlby), first words appear. Object permanence develops. Trust is established (Erikson).</p>
            <div class="stage-tags"><span class="stage-tag">Attachment</span><span class="stage-tag">Object Permanence</span><span class="stage-tag">Trust vs. Mistrust</span><span class="stage-tag">Reflexes → Intentional Acts</span></div>
          </div>
        </div>
        <div class="stage-block">
          <div class="stage-age">Early Childhood<br>2–6 Years</div>
          <div class="stage-content">
            <h4>Early Childhood — "Pre-School / Toy Age"</h4>
            <p>High velocity of language acquisition. Play is the primary mode of learning (Froebel: "Play is the work of children"). Symbolic/imaginative play begins. Strong egocentrism. Imitation is dominant learning strategy. Called the "Golden Age of Imagination".</p>
            <div class="stage-tags"><span class="stage-tag">Egocentrism</span><span class="stage-tag">Symbolic Play</span><span class="stage-tag">Language Burst</span><span class="stage-tag">Animism</span><span class="stage-tag">Toy Age</span></div>
          </div>
        </div>
        <div class="stage-block">
          <div class="stage-age">Later Childhood<br>6–12 Years</div>
          <div class="stage-content">
            <h4>Later Childhood — "Gang Age / School Age"</h4>
            <p>Peer group becomes central. Logical thinking applied to concrete objects (Piaget: Concrete Operational). Conservation mastered. Industry vs. Inferiority (Erikson). Children develop academic skills and teamwork. Called "Gang Age" because peer allegiance dominates.</p>
            <div class="stage-tags"><span class="stage-tag">Gang Age</span><span class="stage-tag">Conservation</span><span class="stage-tag">Logical Thinking</span><span class="stage-tag">Peer Groups</span><span class="stage-tag">Industry</span></div>
          </div>
        </div>
        <div class="stage-block">
          <div class="stage-age" style="background:var(--rose)">Adolescence<br>12–18 Years</div>
          <div class="stage-content">
            <h4>Adolescence — "Storm and Stress" (Hall)</h4>
            <p>Hormonal surges drive physical, emotional, and cognitive changes. Identity formation is the central task (Erikson: Identity vs. Role Confusion). Abstract thinking fully develops. High peer influence; family relationship tension common. Secondary sex characteristics appear.</p>
            <div class="stage-tags"><span class="stage-tag">Storm & Stress</span><span class="stage-tag">Identity Formation</span><span class="stage-tag">Abstract Thinking</span><span class="stage-tag">Puberty</span><span class="stage-tag">Hall's Concept</span></div>
          </div>
        </div>
        <div class="stage-block">
          <div class="stage-age" style="background:var(--violet)">Adulthood<br>18–60 Years</div>
          <div class="stage-content">
            <h4>Adulthood & Later Life</h4>
            <p>Early (career, relationships), Middle (generativity — guiding next generation), Late (ego integrity vs. despair — Erikson). Physical decline begins after 40; wisdom, long-term memory and crystallized intelligence increase.</p>
            <div class="stage-tags"><span class="stage-tag">Generativity</span><span class="stage-tag">Ego Integrity</span><span class="stage-tag">Crystallized Intelligence</span></div>
          </div>
        </div>
      `,
      "Principles": `
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Laws of Directional Development</h3>
          <div class="grid-2" style="margin-top:10px;">
            <div style="background:var(--mint-light);border-radius:8px;padding:12px;border:1px solid #a3d9cc;">
              <div style="font-weight:600;font-size:12.5px;color:var(--mint);margin-bottom:5px;">🔼 Cephalocaudal Law</div>
              <p style="font-size:12px;color:#094f3f;line-height:1.55;"><strong>"Head-to-Tail"</strong> — Development proceeds from the head downward to the feet. Babies control head before trunk, trunk before legs. Brain develops before spinal cord.</p>
            </div>
            <div style="background:#fce9ef;border-radius:8px;padding:12px;border:1px solid #f0aac2;">
              <div style="font-weight:600;font-size:12.5px;color:var(--rose);margin-bottom:5px;">↔ Proximodistal Law</div>
              <p style="font-size:12px;color:#7a1e3e;line-height:1.55;"><strong>"Near-to-Far"</strong> — Development proceeds from the central axis outward to extremities. Arm muscles develop before finger muscles. Core before periphery.</p>
            </div>
          </div>
        </div>
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Other Universal Principles</h3>
          <div class="step-flow">
            <div class="step-item"><div class="step-num">1</div><div class="step-text"><strong>General to Specific:</strong> Random mass movements precede fine-motor precision. Child waves whole arm before pointing a finger.</div></div>
            <div class="step-item"><div class="step-num">2</div><div class="step-text"><strong>Continuous Process:</strong> No sudden jumps — development always builds gradually, even if stages look distinct.</div></div>
            <div class="step-item"><div class="step-num">3</div><div class="step-text"><strong>Uniform Pattern, Variable Rate:</strong> All children pass through the same sequence but at their own individual pace.</div></div>
            <div class="step-item"><div class="step-num">4</div><div class="step-text"><strong>Correlation of Development:</strong> All domains (physical, cognitive, social) are interrelated — delay in one area often affects others.</div></div>
            <div class="step-item"><div class="step-num">5</div><div class="step-text"><strong>Critical Periods:</strong> Certain sensitive windows (e.g., language acquisition before age 7) where learning is maximally efficient.</div></div>
            <div class="step-item"><div class="step-num">6</div><div class="step-text"><strong>Interaction of Heredity & Environment:</strong> Nature (genes) sets the range; Nurture (experience) determines where within that range development falls.</div></div>
          </div>
        </div>
        <div class="quote-block">
          <p>"Development is not a straight line — it is a spiral, always revisiting earlier issues at higher levels of complexity."</p>
          <div class="quote-attr">— Developmental Psychology Perspective</div>
        </div>
      `,
      "Exam Tips": `
        <div class="highlight-box">
          <div class="hb-title">🎯 Most Repeated KTET Points</div>
          <ul>
            <li><strong>G. Stanley Hall</strong> → Adolescence = "Storm and Stress" (Sturm und Drang)</li>
            <li><strong>Cephalocaudal</strong> = Head to tail | <strong>Proximodistal</strong> = Centre to periphery</li>
            <li>Early childhood (2–6) = "Toy Age" or "Pre-school Age"</li>
            <li>Later childhood (6–12) = "Gang Age" or "School Age"</li>
            <li>Growth <strong>stops</strong>; Development is <strong>lifelong</strong></li>
            <li>Development is <strong>qualitative</strong>; Growth is <strong>quantitative</strong></li>
          </ul>
        </div>
        <div class="card card-accent-violet">
          <h3><span class="ch-dot" style="background:var(--violet)"></span>Common MCQ Traps — Avoid These Mistakes</h3>
          <table class="data-table">
            <tr><th>Wrong Choice Given</th><th>Correct Answer</th></tr>
            <tr><td>"Development stops at adulthood"</td><td>Development is continuous — it never stops until death.</td></tr>
            <tr><td>"All children develop at the same rate"</td><td>Pattern is uniform; RATE is individual.</td></tr>
            <tr><td>Proximodistal = head-to-tail</td><td>Proximodistal = centre-to-periphery. Head-to-tail is CEPHALOCAUDAL.</td></tr>
            <tr><td>"Adolescence is stress-free"</td><td>Hall explicitly described it as "Storm and Stress."</td></tr>
            <tr><td>Growth continues throughout life</td><td>Growth stops at physical maturity (~18–20 yrs); development continues.</td></tr>
          </table>
        </div>
        <div class="info-box">
          <p><strong>Remember HALG:</strong> <strong>H</strong>eredity, <strong>A</strong>djustment, <strong>L</strong>earning, <strong>G</strong>rowth — the four main factors influencing child development that appear frequently in KTET questions.</p>
        </div>
      `
    }
  },

  learning_theories: {
    title: "Learning Theories",
    badge: "Segment 02",
    tabs: ["Pavlov", "Skinner", "Thorndike", "Bandura", "Gestalt", "Constructivism"],
    content: {
      "Pavlov": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Ivan Pavlov — Classical Conditioning (1890s)</h3>
          <p>Pavlov discovered that learning occurs through <strong>association between stimuli</strong>. A neutral stimulus, repeatedly paired with an unconditioned stimulus, eventually produces the same response on its own.</p>
        </div>
        <div class="card card-accent-saffron" style="margin-top:4px;">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>The Dog Experiment — Step by Step</h3>
          <div class="step-flow">
            <div class="step-item"><div class="step-num" style="background:var(--mint)">1</div><div class="step-text"><strong>Before Conditioning:</strong> Food (UCS) → Salivation (UCR). Bell alone → No response.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--saffron)">2</div><div class="step-text"><strong>During Conditioning:</strong> Bell (NS) + Food (UCS) presented together, repeatedly. Dog salivates.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--rose)">3</div><div class="step-text"><strong>After Conditioning:</strong> Bell alone (CS) → Salivation (CR). Learning has occurred!</div></div>
          </div>
        </div>
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Key Terminology Grid</h3>
          <table class="data-table">
            <tr><th>Term</th><th>Definition</th><th>Example</th></tr>
            <tr><td><strong>UCS</strong> — Unconditioned Stimulus</td><td>Naturally triggers response without learning</td><td>Food in dog's mouth</td></tr>
            <tr><td><strong>UCR</strong> — Unconditioned Response</td><td>Natural, unlearned reaction</td><td>Salivation to food</td></tr>
            <tr><td><strong>CS</strong> — Conditioned Stimulus</td><td>Previously neutral; now triggers response</td><td>Sound of bell</td></tr>
            <tr><td><strong>CR</strong> — Conditioned Response</td><td>Learned reaction to conditioned stimulus</td><td>Salivation to bell</td></tr>
            <tr><td><strong>Extinction</strong></td><td>CR weakens when CS no longer paired with UCS</td><td>Bell rings repeatedly with no food → salivation stops</td></tr>
            <tr><td><strong>Spontaneous Recovery</strong></td><td>Extinguished CR reappears after rest period</td><td>After extinction, bell again causes brief salivation</td></tr>
            <tr><td><strong>Generalization</strong></td><td>Similar stimuli trigger same CR</td><td>Dog salivates to similar-sounding bells</td></tr>
            <tr><td><strong>Discrimination</strong></td><td>Responding only to specific CS, not similar ones</td><td>Dog learns only one specific bell pitch matters</td></tr>
          </table>
        </div>
        <div class="info-box">
          <p><strong>Classroom Application:</strong> A student who was embarrassed in class may develop anxiety (CR) to just entering the classroom (CS). Conversely, a warm, praise-filled environment (UCS = praise → UCR = happiness) conditions positive feelings toward school (CS → CR).</p>
        </div>
      `,
      "Skinner": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>B.F. Skinner — Operant Conditioning (1938)</h3>
          <p>Unlike Pavlov's passive conditioning, Skinner showed that organisms <strong>operate on their environment</strong>. Behavior is controlled by its consequences — what happens <em>after</em> a behavior determines whether it will be repeated.</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Skinner's Box Experiment</h3>
          <p>A rat was placed in a special box. Accidentally pressing a lever released food (positive reinforcer). The rat learned to press the lever repeatedly. Later, Skinner used electric shocks (negative reinforcers) to study escape behavior.</p>
        </div>
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>The Four Contingencies</h3>
          <table class="data-table">
            <tr><th>Type</th><th>Operation</th><th>Effect on Behavior</th><th>Classroom Example</th></tr>
            <tr><td><strong>Positive Reinforcement</strong></td><td>ADD a pleasant stimulus</td><td>Behavior INCREASES</td><td>Teacher gives stars for completing homework</td></tr>
            <tr><td><strong>Negative Reinforcement</strong></td><td>REMOVE an unpleasant stimulus</td><td>Behavior INCREASES</td><td>Teacher stops nagging when student submits work</td></tr>
            <tr><td><strong>Positive Punishment</strong></td><td>ADD an unpleasant stimulus</td><td>Behavior DECREASES</td><td>Extra homework assigned for misbehavior</td></tr>
            <tr><td><strong>Negative Punishment</strong></td><td>REMOVE a pleasant stimulus</td><td>Behavior DECREASES</td><td>Taking away recess time for fighting</td></tr>
          </table>
        </div>
        <div class="card card-accent-violet">
          <h3><span class="ch-dot" style="background:var(--violet)"></span>Schedules of Reinforcement</h3>
          <ul>
            <li><strong>Fixed Ratio (FR):</strong> Reinforcement after a set number of responses. E.g., reward after every 5 correct answers. Produces high, steady response rates.</li>
            <li><strong>Variable Ratio (VR):</strong> Reinforcement after an unpredictable number of responses. Most resistant to extinction (like slot machines / gambling).</li>
            <li><strong>Fixed Interval (FI):</strong> Reinforcement after a fixed time period. E.g., weekly test. Scallop-shaped response curve — effort peaks near deadline.</li>
            <li><strong>Variable Interval (VI):</strong> Reinforcement after unpredictable time intervals. E.g., pop quizzes. Produces steady, moderate responding.</li>
          </ul>
        </div>
        <div class="highlight-box">
          <div class="hb-title">⚡ Critical Distinction</div>
          <p><strong>Negative Reinforcement ≠ Punishment.</strong> Both involve unpleasant stimuli, but Negative Reinforcement <em>increases</em> behavior (removal of pain = relief = motivation). Punishment <em>decreases</em> behavior. This is the most misunderstood concept in KTET behaviorism questions.</p>
        </div>
      `,
      "Thorndike": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Edward Thorndike — Connectionism / Trial & Error (1898)</h3>
          <p>Thorndike placed a hungry cat in a "Puzzle Box." The cat tried various actions until accidentally pressing a lever that opened the door. Over repeated trials, <strong>random movements decreased</strong> and the correct response was made faster — forming a neural S-R (Stimulus-Response) connection.</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>The Three Primary Laws</h3>
          <div class="step-flow">
            <div class="step-item"><div class="step-num">1</div><div class="step-text"><strong>Law of Readiness:</strong> Learning is effective only when the neural pathway (synaptic arc) is ready to conduct. Forcing a learner who is not ready causes frustration and reduces learning. <em>Implication: Assess readiness before instruction.</em></div></div>
            <div class="step-item"><div class="step-num">2</div><div class="step-text"><strong>Law of Exercise:</strong> A connection is strengthened by use (Law of Use) and weakened by disuse (Law of Disuse). Practice makes permanent. <em>Implication: Regular revision is essential.</em></div></div>
            <div class="step-item"><div class="step-num">3</div><div class="step-text"><strong>Law of Effect:</strong> Responses followed by a satisfying state are more likely to recur; responses followed by an annoying state are less likely. <em>Implication: Immediate positive feedback strengthens learning.</em></div></div>
          </div>
        </div>
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Secondary / Subordinate Laws</h3>
          <ul>
            <li><strong>Law of Multiple Response:</strong> Organism tries many responses until one works.</li>
            <li><strong>Law of Set/Attitude:</strong> Prior mental attitude shapes learning readiness.</li>
            <li><strong>Law of Partial Activity:</strong> Organism responds to dominant elements of a stimulus.</li>
            <li><strong>Law of Assimilation/Analogy:</strong> New situations are handled using responses from similar past situations.</li>
            <li><strong>Law of Associative Shifting:</strong> Any response can be transferred to new stimuli through gradual pairing.</li>
          </ul>
        </div>
        <div class="info-box">
          <p><strong>Transfer of Training:</strong> Thorndike's <strong>Theory of Identical Elements</strong> — learning transfers to new situations only when they share identical elements. Challenged the classical doctrine of "formal discipline" (studying Latin trains the mind generally).</p>
        </div>
      `,
      "Bandura": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Albert Bandura — Social Learning Theory (1961)</h3>
          <p>Bandura argued that <strong>direct reinforcement is not necessary</strong> for learning. Humans learn by observing others in social contexts — a process called <strong>Observational Learning</strong> or <strong>Modeling</strong>. This bridges behaviorism and cognitive psychology.</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>The Bobo Doll Experiment (1961)</h3>
          <p>Children watched an adult model aggressively hit an inflatable Bobo doll. Children who observed the aggressive model imitated the behavior — even without being rewarded. This proved <strong>vicarious reinforcement</strong>: we learn from observing consequences of others' behavior.</p>
        </div>
        <div class="card card-accent-violet">
          <h3><span class="ch-dot" style="background:var(--violet)"></span>4 Processes of Observational Learning</h3>
          <div class="step-flow">
            <div class="step-item"><div class="step-num" style="background:var(--violet)">1</div><div class="step-text"><strong>Attention:</strong> The observer must notice and focus on the model's behavior. Factors: model's attractiveness, prestige, similarity to observer.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--violet)">2</div><div class="step-text"><strong>Retention (Memory):</strong> The observed behavior must be encoded and stored in long-term memory through mental imagery and symbolic coding.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--violet)">3</div><div class="step-text"><strong>Reproduction (Motor):</strong> The learner must have the physical and cognitive ability to replicate what was observed.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--violet)">4</div><div class="step-text"><strong>Motivation:</strong> The learner must want to perform the behavior. Influenced by direct reinforcement, vicarious reinforcement, or self-reinforcement.</div></div>
          </div>
        </div>
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Self-Efficacy — Bandura's Most Important Concept</h3>
          <p>Self-efficacy is the <strong>belief in one's own ability to succeed</strong> in specific situations. High self-efficacy → greater effort, persistence, and achievement. Four sources:</p>
          <ul style="margin-top:8px;">
            <li><strong>Mastery Experiences:</strong> Past successes are the strongest source of self-efficacy.</li>
            <li><strong>Vicarious Experiences:</strong> Watching similar peers succeed raises self-belief.</li>
            <li><strong>Social Persuasion:</strong> Encouragement from teachers/parents boosts efficacy.</li>
            <li><strong>Physiological States:</strong> Low anxiety and good physical state increase efficacy.</li>
          </ul>
        </div>
        <div class="highlight-box">
          <div class="hb-title">⚡ Exam Key Point</div>
          <p>Bandura proposed <strong>Reciprocal Determinism</strong> — behavior, personal factors, and environment all mutually influence each other in a triadic interaction. This explains why the same environment produces different outcomes in different people.</p>
        </div>
      `,
      "Gestalt": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Gestalt / Insight Learning — Wolfgang Köhler (1917)</h3>
          <p>Gestalt psychologists rejected trial-and-error. Learning is not gradual — it happens through a sudden <strong>"Aha!" moment</strong> when the learner perceives the whole pattern and understands the relationship between elements.</p>
          <p style="margin-top:8px;"><strong>Core Principle:</strong> "The whole is greater than the sum of its parts."</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Sultan the Chimpanzee Experiment</h3>
          <p>Köhler placed Sultan (a chimpanzee) in a cage with a banana hung high out of reach, and boxes + sticks on the ground. Sultan initially tried to reach the banana directly (failed), then sat quietly — and <strong>suddenly</strong> stacked the boxes and used a stick to reach the banana. No trial-and-error: pure insight.</p>
        </div>
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Four Stages of Insight Learning</h3>
          <div class="step-flow">
            <div class="step-item"><div class="step-num">1</div><div class="step-text"><strong>Preparation:</strong> Learner gathers information and tries initial approaches that fail.</div></div>
            <div class="step-item"><div class="step-num">2</div><div class="step-text"><strong>Incubation:</strong> A period of rest/quiet reflection where the problem is processed unconsciously.</div></div>
            <div class="step-item"><div class="step-num">3</div><div class="step-text"><strong>Illumination:</strong> The sudden "Aha!" flash of understanding — insight appears.</div></div>
            <div class="step-item"><div class="step-num">4</div><div class="step-text"><strong>Verification:</strong> The solution is tested and confirmed to work in practice.</div></div>
          </div>
        </div>
        <div class="card card-accent-violet">
          <h3><span class="ch-dot" style="background:var(--violet)"></span>Gestalt Laws of Perception</h3>
          <table class="data-table">
            <tr><th>Law</th><th>Principle</th></tr>
            <tr><td><strong>Law of Proximity</strong></td><td>Elements close together are perceived as a group.</td></tr>
            <tr><td><strong>Law of Similarity</strong></td><td>Similar elements are grouped together perceptually.</td></tr>
            <tr><td><strong>Law of Closure</strong></td><td>Mind fills in gaps to see complete figures.</td></tr>
            <tr><td><strong>Law of Continuity</strong></td><td>We follow lines/patterns in the smoothest way.</td></tr>
            <tr><td><strong>Figure-Ground</strong></td><td>We distinguish objects (figure) from background (ground).</td></tr>
          </table>
        </div>
        <div class="highlight-box">
          <div class="hb-title">⚡ Insight vs. Trial & Error</div>
          <p><strong>Thorndike (Trial & Error):</strong> Gradual learning through random attempts. <strong>Köhler (Insight):</strong> Sudden restructuring of the problem field. KTET often asks you to differentiate between these two approaches.</p>
        </div>
      `,
      "Constructivism": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Constructivism — Core Philosophy</h3>
          <p>Learners are <strong>active builders of knowledge</strong>, not passive receivers. Understanding is constructed through experience, reflection, and interaction with the environment. Opposes the idea that knowledge can simply be "transmitted" from teacher to student.</p>
        </div>
        <div class="compare-grid">
          <div class="compare-card">
            <div class="cc-head" style="background:var(--navy)">🧠 Cognitive Constructivism (Piaget)</div>
            <div class="cc-body">
              <div class="cc-item"><span>Focus:</span> Individual construction of knowledge through interaction with physical world.</div>
              <div class="cc-item"><span>Key concepts:</span> Schema, Assimilation, Accommodation, Equilibration.</div>
              <div class="cc-item"><span>Role of Social Interaction:</span> Secondary — peers help but cognitive conflict is the real driver.</div>
              <div class="cc-item"><span>Teacher's Role:</span> Provide rich environments; let children discover independently.</div>
            </div>
          </div>
          <div class="compare-card">
            <div class="cc-head" style="background:var(--mint)">🤝 Social Constructivism (Vygotsky)</div>
            <div class="cc-body">
              <div class="cc-item"><span>Focus:</span> Knowledge is co-constructed through social interaction and cultural tools.</div>
              <div class="cc-item"><span>Key concepts:</span> ZPD, Scaffolding, MKO, Inner Speech.</div>
              <div class="cc-item"><span>Role of Social Interaction:</span> Primary — learning happens first between people, then within.</div>
              <div class="cc-item"><span>Teacher's Role:</span> Provide scaffolding within the ZPD; gradually fade support.</div>
            </div>
          </div>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Other Constructivist Thinkers</h3>
          <ul>
            <li><strong>Jerome Bruner:</strong> Discovery Learning — children learn best by discovering concepts themselves. Introduced "scaffolding" (later expanded by Wood, Bruner & Ross, 1976). Proposed the <em>spiral curriculum</em> — revisit concepts at increasing depth.</li>
            <li><strong>John Dewey:</strong> Experiential Learning — "learning by doing." Education must connect to students' real-world experience. Child-centered approach.</li>
            <li><strong>Maria Montessori:</strong> Children have natural desire to learn; prepared environments and hands-on materials facilitate self-directed learning without coercion.</li>
          </ul>
        </div>
      `
    }
  },

  dev_theories: {
    title: "Developmental Theories",
    badge: "Segment 03",
    tabs: ["Piaget", "Vygotsky", "Kohlberg", "Erikson"],
    content: {
      "Piaget": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Jean Piaget — Cognitive Development Theory</h3>
          <p>Piaget proposed that children are not "small adults" but think in fundamentally different ways at different ages. Knowledge is built through <strong>active interaction</strong> with the environment through two key processes:</p>
          <div class="grid-2" style="margin-top:10px;">
            <div style="background:#e8eef8;border-radius:8px;padding:12px;"><div style="font-weight:600;font-size:12px;color:var(--navy);margin-bottom:4px;">Assimilation</div><p style="font-size:12px;color:#3d4e68;line-height:1.5;">Fitting new information into an existing schema. Child sees a cow for the first time and calls it "dog" (fits into 4-legged animal schema).</p></div>
            <div style="background:#fdf0e0;border-radius:8px;padding:12px;"><div style="font-weight:600;font-size:12px;color:#8a4800;margin-bottom:4px;">Accommodation</div><p style="font-size:12px;color:#7a3800;line-height:1.5;">Modifying existing schema to fit new information. Child is corrected — creates a new "cow" schema, separate from "dog."</p></div>
          </div>
          <div style="background:var(--mint-light);border-radius:8px;padding:10px;margin-top:8px;border:1px solid #a3d9cc;"><p style="font-size:12.5px;color:#094f3f;"><strong>Equilibration:</strong> The balance between Assimilation and Accommodation that drives cognitive growth. Disequilibrium (cognitive conflict) motivates the child to learn and restore equilibrium.</p></div>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Four Stages of Cognitive Development</h3>
        </div>
        <div class="stage-block">
          <div class="stage-age">Sensorimotor<br>0–2 Years</div>
          <div class="stage-content">
            <h4>Sensorimotor Stage</h4>
            <p>Knowledge gained through sensory experience and physical action. Reflexes → intentional goal-directed behavior. Landmark achievement: <strong>Object Permanence</strong> (8–12 months) — understanding objects still exist when out of sight.</p>
            <div class="stage-tags"><span class="stage-tag">Object Permanence</span><span class="stage-tag">Reflex Actions</span><span class="stage-tag">Circular Reactions</span><span class="stage-tag">Cause & Effect</span></div>
          </div>
        </div>
        <div class="stage-block">
          <div class="stage-age" style="background:var(--saffron)">Pre-Operational<br>2–7 Years</div>

          <h3><span class="ch-dot"></span>Erik Erikson — Psychosocial Development Theory</h3>
          <p>Erikson proposed <strong>8 stages across the entire lifespan</strong>, each marked by a psychosocial crisis — a conflict between two opposing forces. Successful resolution of each crisis builds a positive ego quality (virtue); failure leads to maladjustment.</p>

          </table>

        <div class="highlight-box">

            <div class="step-item"><div class="step-num">2</div><div class="step-text"><strong>Incubation:</strong> Unconscious processing; stepping away from the problem allows new connections to form.</div></div>
            <div class="step-item"><div class="step-num">3</div><div class="step-text"><strong>Illumination:</strong> The sudden "Aha!" insight — the creative idea bursts into consciousness.</div></div>
            <div class="step-item"><div class="step-num">4</div><div class="step-text"><strong>Verification:</strong> Testing, refining, and elaborating the creative idea.</div></div>
          </div>
        </div>
        <div class="card card-accent-violet">
          <h3><span class="ch-dot" style="background:var(--violet)"></span>Guilford's Dimensions of Creativity</h3>
          <ul>
            <li><strong>Fluency:</strong> Quantity of ideas generated (more = more creative).</li>
            <li><strong>Flexibility:</strong> Variety of categories of ideas (switching between approaches).</li>
            <li><strong>Originality:</strong> Uniqueness and unusualness of ideas.</li>
            <li><strong>Elaboration:</strong> Ability to develop and flesh out ideas in detail.</li>
          </ul>
        </div>
        <div class="info-box">
          <p><strong>Intelligence vs. Creativity:</strong> The <strong>Threshold Theory</strong> (Torrance, 1962) proposes that a minimum IQ of ~120 is necessary for high creativity, but above that threshold, IQ and creativity are largely independent. Many highly intelligent people are not highly creative, and vice versa.</p>
        </div>
      `

  motivation: {
    title: "Motivation & Emotion",

      "Theories of Motivation": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>What is Motivation?</h3>
          <p>Motivation is the internal state that <strong>activates, directs, and sustains behavior</strong> toward a goal. It determines the intensity and persistence of goal-directed activity. In education, motivation is the engine that drives learning.</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Intrinsic vs. Extrinsic Motivation</h3>
          <div class="grid-2" style="margin-top:8px;">
            <div style="background:var(--mint-light);border-radius:8px;padding:12px;border:1px solid #a3d9cc;">
              <div style="font-weight:600;font-size:12.5px;color:var(--mint);margin-bottom:5px;">Intrinsic Motivation</div>
              <p style="font-size:12px;color:#094f3f;line-height:1.5;">Driven by internal rewards — curiosity, interest, enjoyment, personal satisfaction. The activity itself is rewarding. More durable and deeper learning results.</p>
              <p style="font-size:11.5px;color:#094f3f;margin-top:5px;"><em>Example: Reading because you love the story.</em></p>
            </div>
            <div style="background:var(--saffron-light);border-radius:8px;padding:12px;border:1px solid #f5c87a;">
              <div style="font-weight:600;font-size:12.5px;color:var(--saffron);margin-bottom:5px;">Extrinsic Motivation</div>
              <p style="font-size:12px;color:#7a3800;line-height:1.5;">Driven by external rewards — grades, praise, prizes, or avoiding punishment. Behavior is a means to an end. Can undermine intrinsic motivation (Over-Justification Effect).</p>
              <p style="font-size:11.5px;color:#7a3800;margin-top:5px;"><em>Example: Reading to get a star sticker from the teacher.</em></p>
            </div>
          </div>
        </div>
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Key Motivational Theories</h3>
          <table class="data-table">
            <tr><th>Theory</th><th>Theorist</th><th>Core Idea</th></tr>
            <tr><td><strong>Need Hierarchy</strong></td><td>Maslow (1943)</td><td>5 levels of need; lower needs must be met before higher ones. Teachers must ensure basic needs before focusing on learning.</td></tr>
            <tr><td><strong>ERG Theory</strong></td><td>Alderfer</td><td>Simplified Maslow: Existence, Relatedness, Growth needs. Can work on multiple levels simultaneously.</td></tr>
            <tr><td><strong>Two-Factor Theory</strong></td><td>Herzberg</td><td>Hygiene factors (prevent dissatisfaction) vs. Motivators (produce satisfaction). Relevant to teacher motivation.</td></tr>
            <tr><td><strong>Achievement Motivation</strong></td><td>McClelland</td><td>Need for Achievement (nAch), Power (nPow), Affiliation (nAff). High nAch students prefer moderately challenging tasks.</td></tr>
            <tr><td><strong>Self-Determination Theory</strong></td><td>Deci & Ryan</td><td>Three innate needs: Autonomy, Competence, Relatedness. Satisfaction → intrinsic motivation; thwarting → amotivation.</td></tr>
            <tr><td><strong>Attribution Theory</strong></td><td>Weiner</td><td>Students attribute success/failure to: Ability, Effort, Task difficulty, Luck. Effort attribution (controllable) leads to healthiest motivation.</td></tr>
          </table>
        </div>
        <div class="highlight-box">
          <div class="hb-title">⚡ KTET Critical Point</div>
          <p><strong>Weiner's Attribution Theory:</strong> Teachers should help students attribute success to <strong>effort</strong> (internal, controllable) and failure to <strong>lack of effort</strong> (not lack of ability). Attributing failure to "I'm stupid" (internal, uncontrollable) leads to helplessness and gives up motivation. This is called <strong>Learned Helplessness</strong> (Seligman).</p>
        </div>
      `,
      "Emotion": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Emotion — Definition & Components</h3>
          <p>Emotions are complex psychological states involving three components: (1) a <strong>subjective experience</strong> (feelings), (2) a <strong>physiological response</strong> (body changes), and (3) a <strong>behavioral response</strong> (expression/action).</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Theories of Emotion</h3>
          <table class="data-table">
            <tr><th>Theory</th><th>Theorists</th><th>Sequence of Emotion</th></tr>
            <tr><td><strong>James-Lange Theory</strong></td><td>James & Lange</td><td>Stimulus → Physiological arousal → Emotion. "We feel fear BECAUSE we run; not run because we fear."</td></tr>
            <tr><td><strong>Cannon-Bard Theory</strong></td><td>Cannon & Bard</td><td>Stimulus → Simultaneous emotion + physiology (thalamus sends signals to both cortex and body at the same time).</td></tr>
            <tr><td><strong>Two-Factor / Schachter-Singer</strong></td><td>Schachter & Singer</td><td>Stimulus → Physiological arousal → Cognitive label → Emotion. Arousal alone is ambiguous; we label it based on context.</td></tr>
            <tr><td><strong>Cognitive Appraisal Theory</strong></td><td>Lazarus</td><td>How we appraise/evaluate a situation determines the emotion felt. Same event → different emotions based on interpretation.</td></tr>
          </table>
        </div>
        <div class="card card-accent-violet">
          <h3><span class="ch-dot" style="background:var(--violet)"></span>Emotional Intelligence (EI/EQ)</h3>
          <p><strong>Daniel Goleman (1995)</strong> popularized EI — the ability to recognize, understand, manage, and effectively use emotions. EQ may predict success better than IQ in many life domains. Four branches (Mayer & Salovey):</p>
          <div class="step-flow" style="margin-top:8px;">
            <div class="step-item"><div class="step-num" style="background:var(--violet)">1</div><div class="step-text"><strong>Perceiving Emotions:</strong> Recognizing emotions in faces, voices, art.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--violet)">2</div><div class="step-text"><strong>Using Emotions:</strong> Harnessing emotions to facilitate thought and creativity.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--violet)">3</div><div class="step-text"><strong>Understanding Emotions:</strong> Knowing how emotions evolve and combine.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--violet)">4</div><div class="step-text"><strong>Managing Emotions:</strong> Regulating one's own and others' emotions effectively.</div></div>
          </div>
        </div>
      `,
      "Classroom Application": `
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Strategies to Enhance Student Motivation</h3>
          <div class="step-flow">
            <div class="step-item"><div class="step-num" style="background:var(--mint)">1</div><div class="step-text"><strong>Foster Curiosity:</strong> Begin lessons with puzzles, provocative questions, or surprising demonstrations that create genuine interest.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--mint)">2</div><div class="step-text"><strong>Set Achievable Challenges:</strong> Tasks in the ZPD — challenging but not impossible. Flow state (Csikszentmihalyi) is achieved when skill ≈ challenge.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--mint)">3</div><div class="step-text"><strong>Provide Immediate & Specific Feedback:</strong> Tells students what they're doing right and exactly how to improve — supports competence and self-efficacy.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--mint)">4</div><div class="step-text"><strong>Encourage Mastery Goals:</strong> Focus on learning and improvement (mastery orientation) rather than performance and comparison (performance orientation).</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--mint)">5</div><div class="step-text"><strong>Give Autonomy and Choice:</strong> Allow students to choose topics, formats, or order of tasks — supports self-determination and intrinsic motivation.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--mint)">6</div><div class="step-text"><strong>Build Positive Relationships:</strong> Students work harder for teachers they like and trust — addressing the Relatedness need (Deci & Ryan).</div></div>
          </div>
        </div>
      `
    }
  },

      "Development Stages": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Milestones of Language Development</h3>
          <table class="data-table">
            <tr><th>Age</th><th>Stage</th><th>Key Features</th></tr>
            <tr><td><strong>0–2 months</strong></td><td>Cooing</td><td>Vowel-like sounds, cries. Differentiates cry for hunger vs. pain. Responds to human voice.</td></tr>
            <tr><td><strong>4–6 months</strong></td><td>Babbling</td><td>Consonant-vowel combinations (ba-ba, ma-ma). Universal across languages. Deaf infants also babble initially.</td></tr>
            <tr><td><strong>8–12 months</strong></td><td>Holophrases</td><td>Single words carry sentence meaning. "Milk" = "I want milk." Points to objects. Understands more than speaks.</td></tr>
            <tr><td><strong>18–24 months</strong></td><td>Two-Word Stage</td><td>"More milk," "Daddy go." Telegraphic speech — content words only. Rapid vocabulary growth (word spurt ~50 words/month).</td></tr>

        <div class="highlight-box">
          <div class="hb-title">⚡ Critical Period Hypothesis</div>
          <p><strong>Lenneberg (1967):</strong> There is a <strong>Critical Period</strong> for language acquisition from birth to puberty (~12 years). During this window, the brain is maximally plastic for language learning. Evidence: Genie case (feral child found at 13) — could learn vocabulary but never mastered grammar.</p>

      "Theories": `
        <div class="card card-accent-navy">

        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Behaviourist View — Skinner (1957)</h3>
          <p>Language is learned through <strong>operant conditioning</strong>: imitation of adults + reinforcement of correct utterances. Children are rewarded for saying words correctly → behavior is reinforced → language is acquired.</p>
          <p style="margin-top:6px;font-size:12.5px;color:#7a3800;"><strong>Limitation (Chomsky's critique):</strong> Children produce sentences they have never heard (e.g., "I goed to school"), proving they aren't merely imitating — they are deriving rules.</p>

        <div class="card card-accent-violet">
          <h3><span class="ch-dot" style="background:var(--violet)"></span>Nativist View — Noam Chomsky (1965)</h3>
          <p>Humans are born with a <strong>Language Acquisition Device (LAD)</strong> — an innate biological mechanism that contains universal grammar principles. This explains why all children acquire language rapidly and without explicit instruction.</p>
          <ul style="margin-top:6px;">

          <h3><span class="ch-dot" style="background:var(--mint)"></span>Interactionist View</h3>
          <p>Neither pure biology nor pure environment alone explains language acquisition. Both the <strong>innate capacity</strong> (LAD) AND <strong>social interaction</strong> (motherese, scaffolding, rich input) are necessary. Vygotsky's influence: Language first develops in social context, then becomes internalized thought.</p>
        </div>
      `,
      "Bilingualism": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Bilingualism & Multilingualism in Education</h3>
          <p>Kerala context: Most KTET candidates teach in schools where students may speak Malayalam at home, English as the medium of instruction, and Hindi as a national language. Understanding language acquisition is directly relevant to classroom practice.</p>

          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Types of Bilingualism</h3>
          <ul>
            <li><strong>Simultaneous Bilingualism:</strong> Two languages acquired from birth. Children of bilingual homes. Both languages develop in parallel.</li>
            <li><strong>Sequential Bilingualism:</strong> Second language (L2) acquired after first language (L1) is established. Most school-based L2 learning falls here.</li>
            <li><strong>Additive Bilingualism:</strong> Learning L2 enriches and adds to L1. Positive for cognitive development.</li>
            <li><strong>Subtractive Bilingualism:</strong> L2 replaces L1. Can lead to loss of cultural identity and cognitive confusion.</li>
          </ul>
        </div>
        <div class="info-box">
          <p><strong>Cognitive Advantages of Bilingualism (Cummins):</strong> Bilingual children develop stronger <strong>metalinguistic awareness</strong>, better executive control (task switching, inhibition), and greater cognitive flexibility. Cummins' <strong>Linguistic Interdependence Hypothesis</strong> — proficiency in L1 facilitates L2 acquisition (strong L1 = better L2).</p>
        </div>
      `
    }
  },

  inclusive: {
    title: "Inclusive Education",
    badge: "Segment 08",
    tabs: ["Learning Disabilities", "Gifted Children", "Strategies & Policy"],
    content: {
      "Learning Disabilities": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Learning Disabilities — Definition & Overview</h3>
          <p>A learning disability (LD) is a <strong>neurological disorder</strong> that affects how a person processes information. It is NOT caused by low intelligence, poor teaching, cultural differences, or lack of motivation. IQ is typically average to above average; the gap between potential and performance is the key indicator.</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Major Learning Disabilities — Complete Diagnostic Matrix</h3>
          <table class="data-table">
            <tr><th>Condition</th><th>Area Affected</th><th>Key Symptoms</th><th>Teaching Strategies</th></tr>
            <tr><td><strong>Dyslexia</strong></td><td>Reading & Decoding</td><td>Letter reversals (b↔d, p↔q), slow reading, difficulty with phonics, poor spelling. Most common LD (~80% of all LDs).</td><td>Phonics-based approach, audio books, extra time, colored overlays, multi-sensory instruction (Orton-Gillingham)</td></tr>
            <tr><td><strong>Dysgraphia</strong></td><td>Writing</td><td>Illegible handwriting, inconsistent letter sizing, poor spatial layout, fatigue while writing, difficulty expressing thoughts in writing.</td><td>Allow typing, graph paper for alignment, reduced writing tasks, oral assessments, word processors</td></tr>
            <tr><td><strong>Dyscalculia</strong></td><td>Mathematics</td><td>Difficulty with number sense, counting, arithmetic, understanding math symbols, sequencing, telling time, handling money.</td><td>Concrete manipulatives, visual models, calculator use, graph paper, color coding of steps</td></tr>
            <tr><td><strong>Dyspraxia</strong></td><td>Motor Coordination</td><td>Poor balance, clumsiness, difficulty with fine-motor tasks (tying laces, cutting), poor spatial awareness, difficulty organizing movements.</td><td>Physical therapy, occupational therapy, adaptive PE, extra time for tasks requiring motor skill</td></tr>
            <tr><td><strong>ADHD</strong></td><td>Attention & Impulse Control</td><td>Inattention (easily distracted, forgetful), hyperactivity (fidgeting, can't stay seated), impulsivity (interrupts, acts before thinking). Three subtypes: Inattentive, Hyperactive-Impulsive, Combined.</td><td>Structured routines, frequent breaks, preferential seating, clear instructions, positive reinforcement, movement breaks</td></tr>
            <tr><td><strong>Auditory Processing Disorder</strong></td><td>Sound Processing</td><td>Difficulty understanding spoken language despite normal hearing. Struggles with background noise, following directions, phonics.</td><td>Quiet environment, written instructions, FM systems, visual cues alongside verbal</td></tr>
          </table>
        </div>
        <div class="highlight-box">
          <div class="hb-title">⚡ KTET Frequently Tested</div>
          <ul>
            <li><strong>Dyslexia</strong> = reading difficulty | <strong>Dysgraphia</strong> = writing difficulty | <strong>Dyscalculia</strong> = math difficulty | <strong>Dyspraxia</strong> = coordination difficulty</li>
            <li>Dyslexia is the MOST COMMON learning disability.</li>
            <li>ADHD can be associated with or co-occur with learning disabilities but is classified separately (neurodevelopmental disorder).</li>
            <li>IQ of children with LDs is typically <strong>average or above average</strong> — they are NOT intellectually disabled.</li>
          </ul>
        </div>
      `,
      "Gifted Children": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Giftedness — Definition</h3>
          <p>Gifted children demonstrate outstanding potential or achievement in one or more areas. <strong>Renzulli's Three-Ring Conception</strong> defines giftedness as the intersection of: above-average ability + high task commitment (motivation) + high creativity. IQ above 130 is one criterion, but not the only one.</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Characteristics of Gifted Children</h3>
          <div class="grid-2" style="margin-top:8px;">
            <ul>
              <li>Advanced vocabulary and verbal ability</li>
              <li>Intense curiosity; asks complex questions</li>
              <li>Rapid learning with less repetition</li>
              <li>Strong memory and retention</li>
              <li>High creativity and originality</li>
            </ul>
            <ul>
              <li>Keen sense of humor</li>
              <li>Perfectionism and high standards</li>
              <li>Strong sense of justice and ethics</li>
              <li>Preference for complex problems</li>
              <li>Possible social isolation; asynchronous development</li>
            </ul>
          </div>
        </div>
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Educational Provisions for Gifted Students</h3>
          <table class="data-table">
            <tr><th>Approach</th><th>Description</th><th>Advantages</th></tr>
            <tr><td><strong>Acceleration</strong></td><td>Advancing gifted students to higher grade levels or skipping grades</td><td>Meets academic level; prevents boredom</td></tr>
            <tr><td><strong>Enrichment</strong></td><td>Deeper, broader exploration of topics within the regular grade level</td><td>Social cohesion maintained; greater depth</td></tr>
            <tr><td><strong>Pull-Out Programs</strong></td><td>Gifted students leave regular class for special sessions</td><td>Peer interaction with similar ability</td></tr>
            <tr><td><strong>Mentorship</strong></td><td>Pairing gifted students with expert mentors in their area of talent</td><td>Real-world application and inspiration</td></tr>
          </table>
        </div>
        <div class="info-box">
          <p><strong>Asynchronous Development:</strong> Gifted children often show uneven development — they may be years ahead intellectually but at age-level emotionally or socially. This mismatch can lead to frustration, social difficulties, and behavioral challenges in classrooms not equipped to address their needs.</p>
        </div>
      `,
      "Strategies & Policy": `
        <div class="card card-accent-navy">
          <h3><span class="ch-dot"></span>Inclusive Education — Philosophy & Policy</h3>
          <p>Inclusive education is based on the principle that <strong>all children, regardless of ability, disability, gender, ethnicity, or socioeconomic status</strong>, have the right to learn together in mainstream settings. It is not merely about placement — it requires full participation and belonging.</p>
        </div>
        <div class="card card-accent-saffron">
          <h3><span class="ch-dot" style="background:var(--saffron)"></span>Legal Framework — India</h3>
          <table class="data-table">
            <tr><th>Act/Policy</th><th>Year</th><th>Key Provisions</th></tr>
            <tr><td><strong>Persons with Disabilities Act</strong></td><td>1995</td><td>3% reservation in education and employment; free education up to age 18 for disabled children</td></tr>
            <tr><td><strong>RTE Act (Right to Education)</strong></td><td>2009</td><td>Free and compulsory education for all children 6–14 years; inclusive provisions for CWSN</td></tr>
            <tr><td><strong>RPWD Act</strong></td><td>2016</td><td>Rights of Persons with Disabilities; expanded from 7 to 21 categories of disability; 5% reservation</td></tr>
            <tr><td><strong>NEP (National Education Policy)</strong></td><td>2020</td><td>Strong emphasis on inclusive education; Universal Design for Learning (UDL); multiple assessment options</td></tr>
            <tr><td><strong>Salamanca Statement (UNESCO)</strong></td><td>1994</td><td>International commitment to inclusive education for all children with special educational needs</td></tr>
          </table>
        </div>
        <div class="card card-accent-mint">
          <h3><span class="ch-dot" style="background:var(--mint)"></span>Universal Design for Learning (UDL)</h3>
          <p>UDL is a framework for designing curriculum and instruction that is accessible to all learners from the start, not just retrofitted. Three core principles:</p>
          <div class="step-flow" style="margin-top:8px;">
            <div class="step-item"><div class="step-num" style="background:var(--mint)">1</div><div class="step-text"><strong>Multiple Means of Representation (the "What" of learning):</strong> Present information in multiple formats — visual, auditory, text, hands-on — so all learners can access content.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--mint)">2</div><div class="step-text"><strong>Multiple Means of Action & Expression (the "How" of learning):</strong> Allow students to demonstrate knowledge in various ways — oral, written, drawn, acted, built.</div></div>
            <div class="step-item"><div class="step-num" style="background:var(--mint)">3</div><div class="step-text"><strong>Multiple Means of Engagement (the "Why" of learning):</strong> Offer choices, vary challenge level, connect to student interests to sustain motivation.</div></div>
          </div>
        </div>
        <div class="card card-accent-violet">
          <h3><span class="ch-dot" style="background:var(--violet)"></span>Least Restrictive Environment (LRE) Continuum</h3>
          <div class="hierarchy">
            <div class="h-level" style="background:#fce9ef;"><div class="h-num" style="background:var(--rose);color:white;">7</div><div style="font-size:12px;color:#7a1e3e;">Most Restrictive: Residential institution (24-hr care)</div></div>
            <div class="h-level" style="background:#fdf0e0;"><div class="h-num" style="background:var(--saffron);color:white;">6</div><div style="font-size:12px;color:#7a3800;">Special day school (separate school for CWSN)</div></div>
            <div class="h-level" style="background:#ede9f9;"><div class="h-num" style="background:var(--violet);color:white;">5</div><div style="font-size:12px;color:#3d2a7a;">Full-time special class within regular school</div></div>
            <div class="h-level" style="background:#e8eef8;"><div class="h-num" style="background:var(--navy-mid);color:white;">4</div><div style="font-size:12px;color:var(--navy);">Resource room (part-time pull-out for specialist support)</div></div>
            <div class="h-level" style="background:#e4f7f3;"><div class="h-num" style="background:var(--mint);color:white;">3</div><div style="font-size:12px;color:#094f3f;">Regular class + resource room support</div></div>
            <div class="h-level" style="background:#e4f7f3;"><div class="h-num" style="background:#0a8a6e;color:white;">2</div><div style="font-size:12px;color:#094f3f;">Regular class + itinerant teacher support</div></div>
            <div class="h-level" style="background:#e4f7f3;border:2px solid var(--mint);"><div class="h-num" style="background:#095c4a;color:white;">1</div><div style="font-size:12px;color:#094f3f;"><strong>Least Restrictive: Full inclusion in regular classroom</strong> (ideal goal)</div></div>
          </div>
        </div>
        <div class="highlight-box">
          <div class="hb-title">⚡ Inclusive Ed Exam Points</div>
          <ul>
            <li><strong>CWSN</strong> = Children With Special Needs (preferred term; avoids stigma)</li>
            <li><strong>IEP</strong> = Individual Education Program — a customized plan for each CWSN student specifying goals, supports, and evaluation methods</li>
            <li><strong>Co-teaching</strong> = Regular teacher + Special educator work together in the same classroom</li>
            <li>Integration (mainstreaming) ≠ Inclusion. Integration brings CWSN into regular classes with minimal modification. Inclusion restructures the whole system to welcome all learners.</li>
          </ul>
        </div>
      `
    }
  }
};

let currentSection = 'growth';
let currentTab = null;

function nav(key, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  currentSection = key;
  const sec = sections[key];
  if (!sec) return;
  currentTab = sec.tabs[0];
  renderTopBar(sec.tabs);
  renderContent(currentTab);
  document.getElementById('content').scrollTop = 0;
}

function renderTopBar(tabs) {
  const bar = document.getElementById('top-bar');
  bar.innerHTML = tabs.map(t => `<button class="tab-pill${t===currentTab?' active':''}" onclick="switchTab('${t}',this)">${t}</button>`).join('');
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderContent(tab);
  document.getElementById('content').scrollTop = 0;
}

function renderContent(tab) {
  const sec = sections[currentSection];
  const contentEl = document.getElementById('content');
  const html = sec.content[tab] || '<p>Content coming soon.</p>';
  contentEl.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);">
      <div>
        <div style="font-size:22px;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif;">${sec.title}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.8px;font-weight:500;">${sec.badge} — ${tab}</div>
      </div>
      <div style="background:var(--saffron-light);color:var(--saffron);border:1px solid #f5c87a;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;margin-top:4px;">${sec.badge}</div>
    </div>
    ${html}
  `;
}

window.onload = function() {
  const firstNav = document.querySelector('.nav-item');
  nav('growth', firstNav);
};
</script>
