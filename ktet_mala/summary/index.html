  tabs:['പഠന വൈകല്യങ്ങൾ','പ്രതിഭ','നയം & UDL'],
  content:{
'പഠന വൈകല്യങ്ങൾ':`
<div class="card al"><div class="card-title"><span class="cdot"></span>പഠന വൈകല്യം <span class="en">(Learning Disability)</span> — അവലോകനം</div><p>വിവരം പ്രോസസ്സ് ചെയ്യുന്ന രീതിയെ ബാധിക്കുന്ന <strong>ന്യൂറോ-ജൈവ ക്ഷേദ്ര <span class="en">(Neurological Disorder)</span></strong>. ഇത് കുറഞ്ഞ IQ, മോശം അദ്ധ്യാപനം, ദ്രാരിദ്ര്യം, സാംസ്‌കാരിക വ്യത്യാസം കൊണ്ടല്ല. IQ <strong>ശരാശരി അല്ലെങ്കിൽ അതിനു മുകളിൽ</strong> — ശേഷിയും പ്രകടനവും തമ്മിലുള്ള വിടവ് <span class="en">(Gap)</span> ആണ് സൂചകം.</p></div>
<div class="card ao"><div class="card-title"><span class="cdot" style="background:var(--saffron)"></span>പ്രധാന പഠന വൈകല്യ ചാർട്ട്</div><div class="tbl-wrap"><table class="dtbl"><tr><th>അവസ്ഥ</th><th>മേഖല</th><th>പ്രധാന ലക്ഷണങ്ങൾ</th><th>തന്ത്രങ്ങൾ</th></tr><tr><td><strong>Dyslexia</strong><br><span style="font-size:10px;color:var(--muted);">ഡിസ്‌ലെക്‌സ്‌യ</span></td><td>വായന</td><td>അക്ഷര-മറിച്ചൽ (b↔d), മെല്ലെ വായന, Phonics ബുദ്ധിമുട്ട്. <strong>ഏറ്റവും സാധാരണ LD</strong> (~80%).</td><td>Phonics അടിസ്ഥാന, Audio books, Extra time, Multi-sensory</td></tr><tr><td><strong>Dysgraphia</strong><br><span style="font-size:10px;color:var(--muted);">ഡിസ്‌ഗ്രഫ്‌യ</span></td><td>എഴുത്ത്</td><td>ദുർഗ്രഹ ക്ഷ്ഷ, അക്ഷര-ഇളക്കം, poor layout, എഴുതുമ്പോൾ ക്ഷീണം.</td><td>ടൈപ്പിംഗ് അനുവദിക്കൽ, ഉത്തര-ഓഡ്‌ ആം, Word Processor</td></tr><tr><td><strong>Dyscalculia</strong><br><span style="font-size:10px;color:var(--muted);">(ഗണിത-ക്ഷേദ്ര)</span></td><td>ഗണിതം</td><td>Number Sense ബുദ്ധിമുട്ട്, ഗണിത ചിഹ്ന-ഗ്രഹണ ക്ഷേദ്ര, Sequencing.</td><td>Manipulatives, Color-coded steps, Calculator</td></tr><tr><td><strong>Dyspraxia</strong><br><span style="font-size:10px;color:var(--muted);">(ചലന-ഏകോപന ക്ഷേദ്ര)</span></td><td>ചലനം</td><td>Balance ഇടപ്പ്, Clumsy, Fine-motor tasks ബുദ്ധിമുട്ട്.</td><td>Occupational Therapy, Adaptive PE</td></tr><tr><td><strong>ADHD</strong></td><td>ശ്രദ്ധ</td><td>ശ്രദ്ധക്കുറവ്, Hyperactivity, Impulsivity. മൂന്ന് Subtypes: Inattentive, Hyperactive, Combined.</td><td>ക്രമ-ദിനചര്യ, ഇടക്കിടെ ഇടവേള, Positive Reinforcement</td></tr></table></div></div>
<div class="hbox"><div class="hbox-title">⚡ KTET പ്രധാന പോയിന്റുകൾ</div><ul><li><strong>Dyslexia</strong> = വായന | <strong>Dysgraphia</strong> = എഴുത്ത് | <strong>Dyscalculia</strong> = ഗണിതം | <strong>Dyspraxia</strong> = ഏകോപനം</li><li>Dyslexia = ഏറ്റവും സാധാരണ LD (~80%)</li><li>LD ഉള്ള കുട്ടിക്ക് <strong>ശരാശരി അല്ലെങ്കിൽ അതിലധികം IQ</strong> ഉണ്ടായിരിക്കും</li><li>ADHD — LD-യുമായൊ common-ആകുന്നു; പക്ഷെ വ്യത്യസ്‌ത വർഗ്ഗം</li></ul></div>`,
'പ്രതിഭ':`
<div class="card al"><div class="card-title"><span class="cdot"></span>പ്രതിഭ <span class="en">(Giftedness)</span> — നിർവ്വചനം</div><p><strong>Renzulli-ന്റെ Three-Ring Conception:</strong> ഉയർന്ന ശേഷി + ഉയർന്ന കർ‌മ്മ-നിഷ്‌ഠ + ഉയർന്ന സൃഷ്‌ടിപരത. IQ 130+ ഒരു സൂചകം; ഒരേ ഒരു മാനദണ്ഡം അല്ല.</p></div>
<div class="card ao"><div class="card-title"><span class="cdot" style="background:var(--saffron)"></span>പ്രതിഭ കുട്ടിയുടെ സ്വഭാവ ഗുണങ്ങൾ <span class="en">(Characteristics)</span></div><div class="g2"><div class="mini-card"><div class="mc-title">ഉന്നത ഭാഷ-ശേഷി</div><div class="mc-text">Advanced Vocabulary — വ്യത്യസ്ത പ്രായ-നിലവാരം</div></div><div class="mini-card"><div class="mc-title">തീവ്ര കൗതുകം</div><div class="mc-text">Intense Curiosity — ആഴത്തിലുള്ള ചോദ്യങ്ങൾ</div></div><div class="mini-card"><div class="mc-title">ത്വരിത പഠനം</div><div class="mc-text">Rapid Learning — കുറഞ്ഞ ആവർത്തനം</div></div><div class="mini-card"><div class="mc-title">ഉയർന്ന സൃഷ്‌ടിപരത</div><div class="mc-text">High Creativity — മൗലിക ആശയങ്ങൾ</div></div><div class="mini-card"><div class="mc-title">Perfectionism</div><div class="mc-text">ഉന്നത മാനദണ്ഡം; ആത്മ-വിമർശനം</div></div><div class="mini-card"><div class="mc-title">Asynchronous Dev.</div><div class="mc-text">ബൗദ്ധികം ഉന്നതം; വൈകാരികം പ്രായ-നിലവാരം</div></div></div></div>
<div class="card ag"><div class="card-title"><span class="cdot" style="background:var(--mint)"></span>പ്രതിഭ കുട്ടിക്ക് വിദ്യാഭ്യാസ സൗകര്യങ്ങൾ <span class="en">(Educational Provisions)</span></div><div class="tbl-wrap"><table class="dtbl"><tr><th>സമീപനം</th><th>വിശദം</th><th>ഗുണം</th></tr><tr><td><strong>Acceleration</strong></td><td>ഉയർന്ന ക്ലാസ്സ്/Grade Skip</td><td>ബോറടി ഒഴിവാകൽ; അക്കാദമിക് ശേഷി ചേർക്കൽ</td></tr><tr><td><strong>Enrichment</strong></td><td>ഒരേ Grade-ൽ ആഴത്തിലുള്ള പഠനം</td><td>സാമൂഹ്യ ഐക്യം; കൂടുതൽ ആഴം</td></tr><tr><td><strong>Pull-Out Programs</strong></td><td>പ്രത്യേക സ്ഥലത്ത് Special Session</td><td>സമ-ശേഷി ഗ്രൂപ്പ് ഇടപഴകൽ</td></tr><tr><td><strong>Mentorship</strong></td><td>Expert Mentor-മായി ജോടി</td><td>യഥാർത്ഥ-ലോക പ്രയോഗം</td></tr></table></div></div>`,
'നയം & UDL':`
<div class="card al"><div class="card-title"><span class="cdot"></span>നിയമ-ചട്ടക്കൂട് — ഇന്ത്യ <span class="en">(Legal Framework)</span></div><div class="tbl-wrap"><table class="dtbl"><tr><th>നിയമം</th><th>വ.</th><th>പ്രധാന വ്യവസ്ഥ</th></tr><tr><td><strong>Persons with Disabilities Act</strong></td><td>1995</td><td>3% സംവരണം; 18 വ. വരെ CWSN-ക്ക് സൗജന്യ വിദ്യാഭ്യാസം</td></tr><tr><td><strong>RTE Act</strong></td><td>2009</td><td>6–14 വ. എല്ലാ കുട്ടിക്കും സൗജന്യ-നിർബ്ബന്ധ വിദ്യാഭ്യാസം; CWSN ഉൾക്കൊള്ളൽ</td></tr><tr><td><strong>RPWD Act</strong></td><td>2016</td><td>7 → 21 വൈകല്യ-വർഗ്ഗം; 5% സംവരണം</td></tr><tr><td><strong>NEP</strong></td><td>2020</td><td>UDL, ഒന്നിലധികം Assessment ഓപ്ഷൻ, ഉൾക്കൊള്ളൽ ഊന്നൽ</td></tr><tr><td><strong>Salamanca Statement</strong></td><td>1994</td><td>UNESCO — CWSN-ന് ഉൾക്കൊള്ളൽ വിദ്യാഭ്യാസം</td></tr></table></div></div>
<div class="card ao"><div class="card-title"><span class="cdot" style="background:var(--saffron)"></span>Universal Design for Learning (UDL)</div><p style="margin-bottom:8px;">ആദ്യ-ദിനം മുതൽ <strong>എല്ലാ വിദ്യാർത്ഥിക്കും</strong> ലഭ്യമായ Course Design. മൂന്ന് തത്ത്വങ്ങൾ:</p><div class="steps"><div class="step"><div class="snum" style="background:var(--mint)">1</div><div class="stext"><strong>ഒന്നിലധികം പ്രതിനിധ-മാർഗ്ഗം <span class="en">(Multiple Means of Representation — "What")</span>:</strong> ദൃശ്യ, ശ്രവ്യ, Text, Hands-on — ഒന്നിലധികം format.</div></div><div class="step"><div class="snum" style="background:var(--mint)">2</div><div class="stext"><strong>ഒന്നിലധികം ആവിഷ്‌ക്കരണ-മാർഗ്ഗം <span class="en">(Action & Expression — "How")</span>:</strong> ഉത്തരം — ഉത്ക്കൃഷ്‌ടം, Written, Draw, Act, Build.</div></div><div class="step"><div class="snum" style="background:var(--mint)">3</div><div class="stext"><strong>ഒന്നിലധികം ഇടപഴകൽ-മാർഗ്ഗം <span class="en">(Engagement — "Why")</span>:</strong> ഇഷ്‌ടം, Challenge, Interest — Motivation നിലനിർത്തൽ.</div></div></div></div>
<div class="hbox"><div class="hbox-title">⚡ ഉൾക്കൊള്ളൽ വിദ്യാഭ്യാസ KTET പോയിന്റുകൾ</div><ul><li><strong>CWSN</strong> = Children With Special Needs — ഒൗദ്യോഗിക, ഒളളംചേർ-ഒഴിഞ്ഞ പദം</li><li><strong>IEP</strong> (Individual Education Program) = ഓരോ CWSN-നും Customized Plan</li><li><strong>Integration ≠ Inclusion.</strong> Integration: CWSN-നെ Regular Class-ൽ ഇടൽ. Inclusion: System-ത്തന്നെ മാറ്റൽ.</li><li><strong>LRE</strong> (Least Restrictive Environment) — Full Inclusion in Regular Classroom ആദർശ ലക്ഷ്യം</li></ul></div>`
  }

const MORE_SECTIONS = ['personality','motivation','language','inclusive'];
const MORE_LABELS = {
  personality:'👤 വ്യക്തിത്വം',
  motivation:'🎯 പ്രചോദനം',

let curSection='growth', curTab=null, moreOpen=false;

function goSection(key,el){
  closeMore();
  if(key==='more'){toggleMore(el);return;}
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  curSection=key;
  const sec=SECTIONS[key];
  curTab=sec.tabs[0];
  renderTabs(sec.tabs);
  renderContent();
  document.getElementById('scroll-area').scrollTop=0;
}

function toggleMore(el){
  moreOpen=!moreOpen;
  const ov=document.getElementById('more-overlay');
  if(moreOpen){
    document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('more-items').innerHTML=MORE_SECTIONS.map(k=>`
      <div class="more-item" onclick="selectMore('${k}')">
        ${MORE_LABELS[k]}
        <span class="more-item-badge">${SECTIONS[k].badge}</span>
      </div>`).join('');
    ov.style.display='block';
    setTimeout(()=>document.addEventListener('click',outsideClose,{once:true}),50);
  } else {
    ov.style.display='none';
  }
}
function outsideClose(e){
  if(!document.getElementById('more-overlay').contains(e.target)) closeMore();
}
function closeMore(){
  moreOpen=false;
  document.getElementById('more-overlay').style.display='none';
}
function selectMore(key){
  closeMore();
  curSection=key;
  curTab=SECTIONS[key].tabs[0];
  renderTabs(SECTIONS[key].tabs);
  renderContent();
  document.getElementById('scroll-area').scrollTop=0;
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  document.querySelector('.bnav-item:last-child').classList.add('active');
}
function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderContent();
  document.getElementById('scroll-area').scrollTop=0;
}
function renderTabs(tabs){
  document.getElementById('tab-strip').innerHTML=tabs.map(t=>
    `<button class="tpill${t===curTab?' active':''}" onclick="switchTab('${t}',this)">${t}</button>`
  ).join('');
}
function renderContent(){
  const sec=SECTIONS[curSection];
  document.getElementById('scroll-area').innerHTML=`
    <div class="sec-head">
      <div class="sec-title">${sec.title}</div>
      <div class="sec-crumb">${sec.badge} — ${curTab}</div>
    </div>
    ${sec.content[curTab]||'<p>ഉള്ളടക്കം ഉടൻ ചേർക്കും...</p>'}
  `;
}
window.onload=function(){
  curTab=SECTIONS['growth'].tabs[0];
  renderTabs(SECTIONS['growth'].tabs);
  renderContent();
};
</script>
</body>
</html>
