<script src="data.js"></script>
<script src="common.js"></script>
<script>
  markActiveNav("home");
  const container = document.getElementById("app");
  const totalCh = ALL_CHAPTERS.length;
  const readCh = progress.readChapters.length;
  const overallPct = Math.round((readCh/totalCh)*100);
  const nextChapter = ALL_CHAPTERS.find(c => !progress.readChapters.includes(c.id)) || ALL_CHAPTERS[0];

  const partsHtml = PARTS.map(p => {
    const read = p.chapters.filter(c => progress.readChapters.includes(c.id)).length;
    const pct = Math.round((read/p.chapters.length)*100);
    return `<a class="card part-row" href="${p.file}">
      <div class="part-bar" style="background:${p.color}"></div>
      <div class="part-info">
        <div class="part-toprow"><span style="color:${p.color}">${p.code}</span><span style="color:var(--ink-soft);font-weight:600;">${read}/${p.chapters.length}</span></div>
        <div class="part-title">${esc(p.title)}</div>
        <div class="progressbar"><div style="width:${pct}%;background:${p.color}"></div></div>
      </div>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6"/></svg>
    </a>`;
  }).join("");

  container.innerHTML = `
    <div class="section-pad"><div class="eyebrow">Departmental Test Prep</div><div class="h-page">KSR Made Clear</div></div>
    <div class="hero-card">${ring(overallPct, "#FFFFFF")}
      <div class="hero-copy">
        <div class="title">Syllabus coverage</div>
        <div class="sub">${readCh} of ${totalCh} chapters read</div>
        <div class="hero-streak"><span style="color:#B8892B;">&#9679;</span> Keep a daily streak going</div>
      </div>
    </div>
    <a class="card continue-card" href="${nextChapter.partFile}#${nextChapter.id}">
      <div class="continue-row">
        <div><span class="chip">${nextChapter.partCode}</span>
          <div class="continue-title">Continue learning</div>
          <div class="continue-sub">${esc(nextChapter.title)}</div>
        </div>
        <div class="play-btn"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#fff" d="M8 5v14l11-7z"/></svg></div>
      </div>
    </a>
    <a class="card daily-card" href="practice.html?mode=daily">
      <div class="continue-row">
        <div><div class="continue-title" style="color:var(--ledger-deep)">Daily Practice</div>
          <div class="continue-sub">10 mixed MCQs across the full syllabus</div>
        </div>
        <svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#B8892B" stroke-width="2"/><circle cx="12" cy="12" r="3.5" fill="none" stroke="#B8892B" stroke-width="2"/></svg>
      </div>
    </a>
    <div class="section-title">Browse by part</div>
    <div class="part-list">${partsHtml}</div>
    <div style="height:16px"></div>`;
</script>
</body>
</html>
