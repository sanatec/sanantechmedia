<script src="data.js"></script>
<script src="common.js"></script>
<script>
  markActiveNav("practice");
  const container = document.getElementById("app");
  const presetChapter = qs("chapter");
  const mode = qs("mode");

  if (mode === "daily") {
    const qsList = shuffle(MCQ).slice(0, 10);
    runQuiz({ title:"Daily Practice", tone:"#0F4C43", questions:qsList, key:"daily", kind:"mcq", exitHref:"index.html" });
  } else {
    drawSetup();
  }

  function drawSetup(){
    let scope = presetChapter ? "chapter" : "all";
    let chapterId = presetChapter || ALL_CHAPTERS[0].id;
    let count = 10;

    function draw(){
      const chapterMeta = ALL_CHAPTERS.find(c => c.id === chapterId);
      container.innerHTML = `<div class="setup-wrap">
        <div class="setup-label">Scope</div>
        <div class="seg">
          <button class="seg-btn ${scope==='all'?'active':''}" data-scope="all">Full syllabus</button>
          <button class="seg-btn ${scope==='chapter'?'active':''}" data-scope="chapter">Single chapter</button>
        </div>
        ${scope === "chapter" ? `<div style="margin-top:14px;"><div class="setup-label">Chapter</div>
          <select class="select-field" id="chapterSelect">${ALL_CHAPTERS.map(c => `<option value="${c.id}" ${c.id===chapterId?"selected":""}>${c.partCode} — ${esc(c.title)}</option>`).join("")}</select>
        </div>` : ""}
        <div style="margin-top:14px;"><div class="setup-label">Number of questions</div>
          <div class="seg">${[5,10,20].map(n => `<button class="seg-btn ${count===n?'active':''}" data-count="${n}">${n}</button>`).join("")}</div>
        </div>
        <button class="btn-solid" id="startBtn" style="width:100%;margin-top:26px;background:var(--ledger)">Start practice</button>
      </div>`;
      container.querySelectorAll("[data-scope]").forEach(b => b.onclick = () => { scope = b.dataset.scope; draw(); });
      container.querySelectorAll("[data-count]").forEach(b => b.onclick = () => { count = parseInt(b.dataset.count,10); draw(); });
      const sel = container.querySelector("#chapterSelect"); if (sel) sel.onchange = (e) => { chapterId = e.target.value; };
      container.querySelector("#startBtn").onclick = () => {
        let pool = scope === "all" ? MCQ : MCQ.filter(m => m.ch === chapterId);
        const qsList = shuffle(pool).slice(0, Math.min(count, pool.length));
        const meta = ALL_CHAPTERS.find(c => c.id === chapterId);
        const title = scope === "all" ? "Full syllabus practice" : meta.title;
        const key = scope === "all" ? "all" : chapterId;
        const tone = scope === "all" ? "#0F4C43" : meta.color;
        runQuiz({ title, tone, questions: qsList, key, kind: "mcq", exitHref: "practice.html" });
      };
    }
    draw();
  }
</script>
