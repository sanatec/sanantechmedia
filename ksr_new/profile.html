<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0F4C43" />
<title>Your Progress — KSR Made Clear</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="phone">
  <header class="topbar"><div class="topbar-title">Your Progress</div></header>
  <main id="app" class="app-content"></main>
  <nav class="bottomnav">
    <a class="navbtn" data-tab="home" href="index.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span>
    </a>
    <a class="navbtn" data-tab="learn" href="learn.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15Z"/></svg><span>Learn</span>
    </a>
    <a class="navbtn" data-tab="practice" href="practice.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="0.8" fill="currentColor"/></svg><span>Practice</span>
    </a>
    <a class="navbtn" data-tab="pyq" href="pyq.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Z"/><path fill="none" stroke="currentColor" stroke-width="2" d="M14 2v6h6"/></svg><span>PYQ</span>
    </a>
    <a class="navbtn" data-tab="profile" href="profile.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span>Profile</span>
    </a>
  </nav>
</div>

<script src="data.js"></script>
<script src="common.js"></script>
<script>
  markActiveNav("profile");
  const container = document.getElementById("app");

  function draw(){
    const mcqEntries = Object.values(progress.mcqStats || {});
    const totalMcqAttempts = mcqEntries.reduce((s,e) => s+e.attempts, 0);
    const avgAccuracy = mcqEntries.length ? Math.round(mcqEntries.reduce((s,e) => s+(e.lastScore/e.lastTotal),0)/mcqEntries.length*100) : 0;
    const pyqDone = Object.keys(progress.pyqStats || {}).length;
    const stats = [
      { label:"Chapters read", val:`${progress.readChapters.length}/${ALL_CHAPTERS.length}`, color:"#0F4C43" },
      { label:"MCQ accuracy", val:`${avgAccuracy}%`, color:"#B8892B" },
      { label:"PYQ sets tried", val:`${pyqDone}/${PYQ_SETS.length}`, color:"#5B4B8A" },
      { label:"Practice sessions", val:`${totalMcqAttempts}`, color:"#1F7A4D" },
    ];
    const statHtml = stats.map(s => `<div class="stat-card"><div style="width:17px;height:17px;border-radius:4px;background:${s.color}"></div><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join("");
    const masteryHtml = PARTS.map(p => {
      const read = p.chapters.filter(c => progress.readChapters.includes(c.id)).length;
      const pct = Math.round((read/p.chapters.length)*100);
      return `<a class="mastery-row" href="${p.file}" style="display:block;text-decoration:none;">
        <div class="mastery-top"><span>${p.code} — ${esc(p.title)}</span><span style="color:${p.color}">${pct}%</span></div>
        <div class="progressbar" style="margin-top:7px;"><div style="width:${pct}%;background:${p.color}"></div></div>
      </a>`;
    }).join("");
    container.innerHTML = `<div style="padding:10px 16px 30px;">
      <div class="stat-grid">${statHtml}</div>
      <div class="section-title" style="padding-left:0;padding-right:0;">Part-wise mastery</div>
      <div style="display:flex;flex-direction:column;gap:8px;">${masteryHtml}</div>
      <button class="danger-btn" id="resetBtn">Reset all progress</button>
    </div>`;
    container.querySelector("#resetBtn").onclick = () => {
      if (confirm("Reset all learning progress and quiz scores? This cannot be undone.")) { resetProgress(); draw(); }
    };
  }
  draw();
</script>
</body>
</html>
