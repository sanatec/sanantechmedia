<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0F4C43" />
<title>Learn — KSR Made Clear</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="phone">
  <header class="topbar"><div class="topbar-title">Learn</div></header>
  <main id="app" class="app-content"></main>
  <nav class="bottomnav">
    <a class="navbtn" data-tab="home" href="index.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span>
    </a>
    <a class="navbtn" data-tab="learn" href="learn.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15Z"/></svg><span>Learn</span>
    </a>
    <a class="navbtn" data-tab="practice" href="practice.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="0.8" fill="currentColor"/></svg><span>Practice</span>
    </a>
    <a class="navbtn" data-tab="pyq" href="pyq.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Z"/><path fill="none" stroke="currentColor" stroke-width="2" d="M14 2v6h6"/></svg><span>PYQ</span>
    </a>
    <a class="navbtn" data-tab="profile" href="profile.html">
      <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span>Profile</span>
    </a>
  </nav>
</div>

<script src="data.js"></script>
<script src="common.js"></script>
<script>
  markActiveNav("learn");
  const container = document.getElementById("app");
  const html = PARTS.map(p => {
    const read = p.chapters.filter(c => progress.readChapters.includes(c.id)).length;
    const pct = Math.round((read/p.chapters.length)*100);
    return `<a class="card" href="${p.file}" style="display:block;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <span style="font-size:11px;font-weight:700;color:${p.color}">${p.code}</span>
          <div style="font-family:Manrope,sans-serif;font-weight:800;font-size:15px;">${esc(p.title)}</div>
          <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">${read}/${p.chapters.length} chapters read · ${p.chapters.length} lessons</div>
        </div>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6"/></svg>
      </div>
      <div class="progressbar" style="margin-top:10px;"><div style="width:${pct}%;background:${p.color}"></div></div>
    </a>`;
  }).join("");
  container.innerHTML = `<div style="padding:14px 16px 24px;">
    <div style="font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:14px;">Each part opens as its own page with every chapter, a short lesson, key points, and a practice link.</div>
    ${html}
  </div>`;
</script>
</body>
</html>
